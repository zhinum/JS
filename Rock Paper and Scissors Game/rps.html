<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPS-UI-DESIGN</title>
    <script src="/js1/JS/Rock Paper and Scissors Game/main.js" defer></script>
  </head>
  <body>
    <h1>lets Play Rock Paper or Scissors</h1>
    <h3>Pick a button</h3>
    <ul>
      <li><button id="rock">Rock</button></li>
      <li><button id="paper">Paper</button></li>
      <li><button id="scissors">Scissors</button></li>
    </ul>
    <div id="result-display">
      <p id="com-result"></p>
      <p id="hum-result"></p>
      <p id="result"></p>
    </div>
    <div id="score-display">
      <span id="com-score"></span>
      <span id="hum-score"></span>
    </div>
    <div id="final-winner"></div>
  </body>
</html>
