<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="library.js" defer></script>
    <link rel="stylesheet" href="library.css" />
  </head>
  <body>
    <div>
      <button class="open-button">Add Book</button>
    </div>

    <div class="Grid-container"></div>

    <dialog id="book-dialog">
      <form id="book-form" method="dialog">
        <h2>Add New Book</h2>

        <label for="title">Title:</label>
        <input type="text" id="title" required />

        <label for="author">Author:</label>
        <input type="text" id="author" required />

        <label for="pages">Pages:</label>
        <input type="number" id="pages" min="1" required />

        <div class="form-checkbox">
          <label for="ifRead">Have you read it?</label>
          <input type="checkbox" id="ifRead" />
        </div>

        <div class="form-buttons">
          <button type="button" class="cancel-btn">Cancel</button>
          <button type="submit" class="submit-btn">Add to Library</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
